<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Investment Pod">
  <!-- Textless lockup (96-grid): same slab-industrial overflow mark,
       breathing room around the plate (16 inset). All geometry lives in
       plate-local (2..62) space inside a single translate; the clipPath
       rect uses the SAME local coords as the plate base. -->
  <defs>
    <clipPath id="plate-lg">
      <rect x="2" y="2" width="60" height="60" rx="14" ry="14" />
    </clipPath>
  </defs>

  <g transform="translate(16 16)">
    <!-- Plate base -->
    <rect x="2" y="2" width="60" height="60" rx="14" ry="14"
          fill="oklch(0.11 0.008 260)" />

    <!-- Oversized monogram, clipped to plate -->
    <g fill="oklch(0.96 0.005 260)" clip-path="url(#plate-lg)">
      <rect x="14" y="4" width="10" height="52" />
      <rect x="12" y="56" width="14" height="4" />
      <path fill-rule="evenodd" d="
        M 14 4
        L 53 4
        L 58 9
        L 58 36
        L 14 36
        Z
        M 24 10
        L 50 10
        L 50 30
        L 24 30
        Z
      " />
    </g>

    <!-- Plate hairline ring -->
    <rect x="2" y="2" width="60" height="60" rx="14" ry="14"
          fill="none" stroke="oklch(0.96 0.005 260)" stroke-opacity="0.10" stroke-width="1" />
    <!-- Cyan inset glow ring -->
    <rect x="3.5" y="3.5" width="57" height="57" rx="12.5" ry="12.5"
          fill="none" stroke="oklch(0.82 0.14 215)" stroke-opacity="0.20" stroke-width="0.5" />

    <!-- Focal node: outer halo + mid + core -->
    <circle cx="24" cy="10" r="4" fill="oklch(0.82 0.14 215)" fill-opacity="0.14" />
    <circle cx="24" cy="10" r="2.5" fill="oklch(0.82 0.14 215)" fill-opacity="0.30" />
    <circle cx="24" cy="10" r="1.5" fill="oklch(0.82 0.14 215)" />
  </g>
</svg>
